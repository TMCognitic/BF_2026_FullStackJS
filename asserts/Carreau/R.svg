<svg xmlns="http://www.w3.org/2000/svg" width="750" height="1050" viewBox="0 0 750 1050">

  <rect x="40" y="40" 
        width="670" height="970"
        rx="40" ry="40"
        fill="white" stroke="black" stroke-width="8" />

  <text x="70" y="130"
        font-family="'Times New Roman', serif" font-size="90" fill="red">R</text>
  <text x="75" y="220"
        font-family="'Times New Roman', serif" font-size="90" fill="red">♦</text>

  <g transform="rotate(180 680 920)">
    <text x="675" y="1010"
          font-family="'Times New Roman', serif" font-size="90" fill="red">♦</text>
    <text x="680" y="920"
          font-family="'Times New Roman', serif" font-size="90" fill="red">R</text>    
  </g>
<!-- Figure Roi (haut) -->
<!-- Tête -->
<circle cx="375" cy="290" r="70"
        fill="#f0d0b0" stroke="black" stroke-width="4" />
<!-- Barbe -->
<path d="M320 310 Q375 360 430 310 L430 340 Q375 390 320 340 Z"
      fill="#333333" stroke="black" stroke-width="3" />
<!-- Couronne -->
<polygon points="320,230 345,190 365,230 385,190 405,230 430,190 450,230"
         fill="gold" stroke="black" stroke-width="4" />
<!-- Torse -->
<rect x="285" y="330" width="180" height="160"
      fill="#003366" stroke="black" stroke-width="4" />
<!-- Épaule décor -->
<polygon points="285,330 375,380 465,330 375,310"
         fill="#cc0000" stroke="black" stroke-width="3" />
<!-- Bande diagonale -->
<polygon points="270,340 310,320 480,470 440,490"
         fill="#ffcc00" opacity="0.9" />

<!-- Épée -->
<rect x="365" y="260" width="10" height="230"
      fill="#cccccc" stroke="black" stroke-width="3" />
<rect x="345" y="280" width="50" height="10"
      fill="#cccccc" stroke="black" stroke-width="3" />
<polygon points="370,240 360,260 380,260"
         fill="#cccccc" stroke="black" stroke-width="3" />

<!-- Pique central -->
<text x="375" y="520"
      font-family="'Times New Roman', serif"
      font-size="140" text-anchor="middle" fill="red">♦</text>

<!-- Figure Roi (bas, miroir) -->
<g transform="rotate(180 375 525)">
  <circle cx="375" cy="290" r="70"
          fill="#f0d0b0" stroke="black" stroke-width="4" />
  <path d="M320 310 Q375 360 430 310 L430 340 Q375 390 320 340 Z"
        fill="#333333" stroke="black" stroke-width="3" />
  <polygon points="320,230 345,190 365,230 385,190 405,230 430,190 450,230"
           fill="gold" stroke="black" stroke-width="4" />
  <rect x="285" y="330" width="180" height="160"
        fill="#003366" stroke="black" stroke-width="4" />
  <polygon points="285,330 375,380 465,330 375,310"
           fill="#cc0000" stroke="black" stroke-width="3" />
  <polygon points="270,340 310,320 480,470 440,490"
           fill="#ffcc00" opacity="0.9" />
  <rect x="365" y="260" width="10" height="230"
        fill="#cccccc" stroke="black" stroke-width="3" />
  <rect x="345" y="280" width="50" height="10"
        fill="#cccccc" stroke="black" stroke-width="3" />
  <polygon points="370,240 360,260 380,260"
           fill="#cccccc" stroke="black" stroke-width="3" />
  <text x="375" y="520"
        font-family="'Times New Roman', serif"
        font-size="140" text-anchor="middle" fill="red">♦</text>
</g></svg>
