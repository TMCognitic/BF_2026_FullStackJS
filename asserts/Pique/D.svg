<svg xmlns="http://www.w3.org/2000/svg" width="750" height="1050" viewBox="0 0 750 1050">

  <rect x="40" y="40" 
        width="670" height="970"
        rx="40" ry="40"
        fill="white" stroke="black" stroke-width="8" />

  <text x="70" y="130"
        font-family="'Times New Roman', serif" font-size="90" fill="black">D</text>
  <text x="75" y="220"
        font-family="'Times New Roman', serif" font-size="90" fill="black">♠</text>

  <g transform="rotate(180 680 920)">
    <text x="675" y="1010"
          font-family="'Times New Roman', serif" font-size="90" fill="black">♠</text>
    <text x="680" y="920"
          font-family="'Times New Roman', serif" font-size="90" fill="black">D</text>    
  </g>
<!-- Figure Dame (haut) -->
<!-- Tête -->
<circle cx="375" cy="290" r="70"
        fill="#f4d4c0" stroke="black" stroke-width="4" />
<!-- Cheveux -->
<path d="M310 260 Q375 210 440 260 L440 340 Q375 380 310 340 Z"
      fill="#331a0f" stroke="black" stroke-width="3" />
<!-- Couronne -->
<polygon points="330,230 355,190 375,230 395,190 420,230"
         fill="gold" stroke="black" stroke-width="4" />
<!-- Torse -->
<rect x="285" y="330" width="180" height="160"
      fill="#880044" stroke="black" stroke-width="4" />
<!-- Col décoratif -->
<polygon points="285,330 375,380 465,330 375,310"
         fill="#ffccdd" stroke="black" stroke-width="3" />
<!-- Rose / pique stylisé dans la main -->
<text x="460" y="360"
      font-family="'Times New Roman', serif"
      font-size="80" fill="black">♠</text>

<!-- Symbole pique central -->
<text x="375" y="520"
      font-family="'Times New Roman', serif"
      font-size="140" text-anchor="middle" fill="black">♠</text>

<!-- Figure Dame (bas, miroir) -->
<g transform="rotate(180 375 525)">
  <circle cx="375" cy="290" r="70"
          fill="#f4d4c0" stroke="black" stroke-width="4" />
  <path d="M310 260 Q375 210 440 260 L440 340 Q375 380 310 340 Z"
        fill="#331a0f" stroke="black" stroke-width="3" />
  <polygon points="330,230 355,190 375,230 395,190 420,230"
           fill="gold" stroke="black" stroke-width="4" />
  <rect x="285" y="330" width="180" height="160"
        fill="#880044" stroke="black" stroke-width="4" />
  <polygon points="285,330 375,380 465,330 375,310"
           fill="#ffccdd" stroke="black" stroke-width="3" />
  <text x="460" y="360"
        font-family="'Times New Roman', serif"
        font-size="80" fill="black">♠</text>
  <text x="375" y="520"
        font-family="'Times New Roman', serif"
        font-size="140" text-anchor="middle" fill="black">♠</text>
</g></svg>
