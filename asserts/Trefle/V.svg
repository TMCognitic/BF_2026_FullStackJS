<svg xmlns="http://www.w3.org/2000/svg" width="750" height="1050" viewBox="0 0 750 1050">

  <rect x="40" y="40" 
        width="670" height="970"
        rx="40" ry="40"
        fill="white" stroke="black" stroke-width="8" />

  <text x="70" y="130"
        font-family="'Times New Roman', serif" font-size="90" fill="black">V</text>
  <text x="75" y="220"
        font-family="'Times New Roman', serif" font-size="90" fill="black">♣</text>

  <g transform="rotate(180 680 920)">
    <text x="675" y="1010"
          font-family="'Times New Roman', serif" font-size="90" fill="black">♣</text>
    <text x="680" y="920"
          font-family="'Times New Roman', serif" font-size="90" fill="black">V</text>    
  </g>
<!-- Figure Valet (haut) -->
<!-- Tête -->
<circle cx="375" cy="290" r="70"
        fill="#f0d0b0" stroke="black" stroke-width="4" />
<!-- Casque / bonnet -->
<path d="M305 270 Q375 220 445 270 L445 250 Q375 200 305 250 Z"
      fill="#003366" stroke="black" stroke-width="4" />
<!-- Torse -->
<rect x="285" y="330" width="180" height="160"
      fill="#004488" stroke="black" stroke-width="4" />
<!-- Bande diagonale -->
<polygon points="270,340 310,320 480,470 440,490"
         fill="#cc0000" opacity="0.9" />
<!-- Épée simple -->
<rect x="360" y="260" width="10" height="220"
      fill="#cccccc" stroke="black" stroke-width="3" />
<rect x="340" y="280" width="50" height="10"
      fill="#cccccc" stroke="black" stroke-width="3" />

<!-- Symbole pique central -->
<text x="375" y="520"
      font-family="'Times New Roman', serif"
      font-size="140" text-anchor="middle" fill="black">♣</text>

<!-- Figure Valet (bas, miroir) -->
<g transform="rotate(180 375 525)">
  <circle cx="375" cy="290" r="70"
          fill="#f0d0b0" stroke="black" stroke-width="4" />
  <path d="M305 270 Q375 220 445 270 L445 250 Q375 200 305 250 Z"
        fill="#003366" stroke="black" stroke-width="4" />
  <rect x="285" y="330" width="180" height="160"
        fill="#004488" stroke="black" stroke-width="4" />
  <polygon points="270,340 310,320 480,470 440,490"
           fill="#cc0000" opacity="0.9" />
  <rect x="360" y="260" width="10" height="220"
        fill="#cccccc" stroke="black" stroke-width="3" />
  <rect x="340" y="280" width="50" height="10"
        fill="#cccccc" stroke="black" stroke-width="3" />
  <text x="375" y="520"
        font-family="'Times New Roman', serif"
        font-size="140" text-anchor="middle" fill="black">♣</text>
</g></svg>
