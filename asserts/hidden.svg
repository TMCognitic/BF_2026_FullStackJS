  <svg xmlns="http://www.w3.org/2000/svg" width="750" height="1050" viewBox="0 0 750 1050">
  <!-- Fond rouge -->
  <rect x="0" y="0" width="750" height="1050" fill="#B00000"/>
  <!-- Cadre extérieur -->
  <rect x="30" y="30" width="690" height="990"
        fill="none" stroke="white" stroke-width="12" rx="40" ry="40"/>
  <!-- Cadre intérieur -->
  <rect x="60" y="60" width="630" height="930"
        fill="none" stroke="white" stroke-width="6" rx="30" ry="30"/>
  <!-- Motif répétitif (grille de cercles) -->
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="6" fill="white" opacity="0.8"/>
    </pattern>
  </defs>
  <!-- Zone motif -->
  <rect x="90" y="90" width="570" height="870" fill="url(#dots)" rx="20" ry="20"/>
  <!-- Rosace centrale -->
  <g transform="translate(375,525)">
    <circle r="140" fill="none" stroke="white" stroke-width="10"/>
    <circle r="110" fill="none" stroke="white" stroke-width="6"/>
    <!-- Motif floral -->
    <g fill="white">
      <path d="M0,-90 Q40,-40 0,0 Q-40,-40 0,-90Z"/>
      <path d="M90,0 Q40,40 0,0 Q40,-40 90,0Z"/>
      <path d="M0,90 Q-40,40 0,0 Q40,40 0,90Z"/>
      <path d="M-90,0 Q-40,-40 0,0 Q-40,40 -90,0Z"/>
    </g>
    <!-- Petit cercle central -->
    <circle r="18" fill="white"/>
  </g>
</svg>