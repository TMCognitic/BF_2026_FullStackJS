<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./scripts/exo3.js" defer></script>
    <link rel="stylesheet" href="./css/exo3.css" />
    <title>Document</title>
</head>
<body>
    <div class="mainContainer">    
        <div class="inputs">
            <div class="container">
                <h1>Calculatrice</h1>                
            </div>
            <div class="container">
                <label for="nb1">Nombre 1 :</label>
                <input type="number" id="nb1" />
            </div>
            <div class="container">
                <label for="nb2">Nombre 2 :</label>
                <input type="number" id="nb2" />
            </div>
        </div>
        <div class="container">
            <button id="btnAddition">+</button>
            <button id="btnSoustraction">-</button>
            <button id="btnMultiplication">*</button>
            <button id="btnDivision">/</button>
        </div>
        <div class="container inputs">
            <label for="result">Resultat :</label>
            <input id="result" disabled />
        </div>
    </div>
</body>
</html>
